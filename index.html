<!DOCTYPE html>
<html>
<head>
    <title>3D Gesture Particles</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1); 
              backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: rgba(255,255,255,0.4); }
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 200px; border-radius: 10px; overflow: hidden; opacity: 0.6; }
        video { transform: scaleX(-1); width: 100%; }
    </style>
</head>
<body>
    <div id="ui">
        <h3>Vibe Controls</h3>
        <label>Particle Color</label><br>
        <input type="color" id="colorPicker" value="#00ffcc" style="width:100%; height:40px; border:none; background:none;">
        <div class="btn-group">
            <button onclick="setTemplate('heart')">❤️ Heart</button>
            <button onclick="setTemplate('flower')">🌸 Flower</button>
            <button onclick="setTemplate('saturn')">🪐 Saturn</button>
            <button onclick="setTemplate('buddha')">🧘 Buddha</button>
            <button onclick="setTemplate('fireworks')">🎆 Fireworks</button>
        </div>
    </div>
    
    <div id="video-container"><video id="input_video"></video></div>

    <script>
        let scene, camera, renderer, particles, targetPositions;
        const count = 8000;
        let currentTension = 1.0;
        let lerpTarget = 1.0;

        // --- Three.js Setup ---
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            targetPositions = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) pos[i] = (Math.random()-0.5)*10;
            
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ size: 0.03, transparent: true, blending: THREE.AdditiveBlending });
            particles = new THREE.Points(geo, mat);
            scene.add(particles);
            setTemplate('heart');
        }

        function setTemplate(type) {
            const posAttr = particles.geometry.attributes.position;
            for (let i = 0; i < count; i++) {
                let v;
                const t = (i / count) * Math.PI * 2;
                if(type === 'heart') v = templates.heart(t);
                else if(type === 'flower') v = templates.flower(t);
                else if(type === 'saturn') v = templates.saturn(t);
                else v = templates.buddha(t); // Default
                
                targetPositions[i*3] = v.x;
                targetPositions[i*3+1] = v.y;
                targetPositions[i*3+2] = v.z;
            }
        }

        // --- MediaPipe Hand Logic ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                let avgTension = 0;
                results.multiHandLandmarks.forEach(hlm => {
                    avgTension += calculateHandTension(hlm);
                });
                // Map tension (0.1 - 0.4) to scale (0.5 - 3.0)
                lerpTarget = THREE.MathUtils.mapLinear(avgTension / results.multiHandLandmarks.length, 0.1, 0.4, 0.5, 4.0);
            }
        });

        const videoElement = document.getElementById('input_video');
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraUtils.start();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Smoothly interpolate tension scale
            currentTension += (lerpTarget - currentTension) * 0.1;
            particles.scale.setScalar(currentTension);
            
            // Morph positions
            const posArr = particles.geometry.attributes.position.array;
            for(let i=0; i<count*3; i++) {
                posArr[i] += (targetPositions[i] - posArr[i]) * 0.05;
            }
            particles.geometry.attributes.position.needsUpdate = true;
            
            // Update Color
            particles.material.color.set(document.getElementById('colorPicker').value);
            
            particles.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        initThree();
        animate();
    </script>
</body>
</html>
