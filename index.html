<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Gesture Particles</title>
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    
    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        /* Modern Glassmorphism UI */
        #controls {
            position: absolute; top: 20px; left: 20px; width: 220px;
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            z-index: 10; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.8);
        }

        h2 { margin: 0 0 20px 0; font-size: 18px; font-weight: 300; letter-spacing: 1px; }
        
        .section { margin-bottom: 20px; }
        label { display: block; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; opacity: 0.7; }
        
        input[type="color"] {
            width: 100%; height: 40px; border: none; border-radius: 8px; background: none; cursor: pointer;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px 5px; border-radius: 8px; cursor: pointer;
            font-size: 12px; transition: all 0.3s ease;
        }
        button:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }
        button.active { background: #fff; color: #000; }

        #video-container {
            position: absolute; bottom: 20px; right: 20px; width: 180px; height: 135px;
            border-radius: 15px; overflow: hidden; border: 2px solid var(--glass); transform: scaleX(-1);
        }
        #loading {
            position: fixed; inset: 0; background: #000; display: flex; 
            align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loading">Initialising Camera & AI...</div>

    <div id="controls">
        <h2>PARTICLE LAB</h2>
        
        <div class="section">
            <label>System Color</label>
            <input type="color" id="colorPicker" value="#00d4ff">
        </div>

        <div class="section">
            <label>Shape Template</label>
            <div class="grid">
                <button onclick="setShape('heart')">Heart</button>
                <button onclick="setShape('flower')">Flower</button>
                <button onclick="setShape('saturn')">Saturn</button>
                <button onclick="setShape('buddha')">Buddha</button>
                <button onclick="setShape('fireworks')">Explode</button>
            </div>
        </div>
        
        <div style="font-size: 10px; opacity: 0.5; margin-top: 20px;">
            HINT: Open/Close hands to scale particles.
        </div>
    </div>

    <div id="video-container">
        <video id="input_video" style="width: 100%; height: 100%; object-fit: cover;"></video>
    </div>

    <script>
        let scene, camera, renderer, particles, targetPositions;
        const particleCount = 12000;
        let currentScale = 1;
        let targetScale = 1;

        // --- Shape Formulas ---
        const getShapePos = (index, type) => {
            const i = index / particleCount;
            const t = i * Math.PI * 2;
            const u = Math.random() * Math.PI * 2;
            const v = Math.random() * Math.PI;

            switch(type) {
                case 'heart':
                    const xh = 16 * Math.pow(Math.sin(t), 3);
                    const yh = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    return new THREE.Vector3(xh * 0.12, yh * 0.12, (Math.random()-0.5)*0.5);
                
                case 'flower':
                    const r = 2 * Math.cos(5 * t);
                    return new THREE.Vector3(r * Math.cos(t) * 1.5, r * Math.sin(t) * 1.5, (Math.random()-0.5)*0.5);
                
                case 'saturn':
                    if (index % 3 === 0) { // Ring
                        const rr = 3 + Math.random() * 1.5;
                        return new THREE.Vector3(rr * Math.cos(t), (Math.random()-0.5)*0.2, rr * Math.sin(t));
                    } // Planet
                    return new THREE.Vector3(Math.cos(u)*Math.sin(v)*2, Math.cos(v)*2, Math.sin(u)*Math.sin(v)*2);
                
                case 'buddha':
                    // Simplified meditative silhouette
                    const yb = (Math.random() * 4) - 2;
                    const width = Math.exp(-Math.pow(yb + 0.5, 2)) * 1.5;
                    return new THREE.Vector3((Math.random()-0.5) * width, yb, (Math.random()-0.5) * width);

                case 'fireworks':
                    const dist = 2 + Math.random() * 3;
                    return new THREE.Vector3(Math.cos(u)*Math.sin(v)*dist, Math.cos(v)*dist, Math.sin(u)*Math.sin(v)*dist);
            }
        };

        // --- Initialize Three.js ---
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            targetPositions = new Float32Array(particleCount * 3);

            for(let i=0; i<particleCount*3; i++) {
                positions[i] = (Math.random() - 0.5) * 10;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.025,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            setShape('heart');
            window.addEventListener('resize', onWindowResize);
        }

        function setShape(type) {
            for (let i = 0; i < particleCount; i++) {
                const pos = getShapePos(i, type);
                targetPositions[i*3] = pos.x;
                targetPositions[i*3+1] = pos.y;
                targetPositions[i*3+2] = pos.z;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- MediaPipe Hand Tracking ---
        const videoElement = document.getElementById('input_video');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            document.getElementById('loading').style.display = 'none';
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                let totalTension = 0;
                
                results.multiHandLandmarks.forEach(landmarks => {
                    const wrist = landmarks[0];
                    // Measure distance of all fingertips from wrist
                    const fingerTips = [4, 8, 12, 16, 20];
                    let handDist = 0;
                    fingerTips.forEach(tipIdx => {
                        const tip = landmarks[tipIdx];
                        handDist += Math.hypot(tip.x - wrist.x, tip.y - wrist.y);
                    });
                    totalTension += (handDist / 5);
                });

                const avgTension = totalTension / results.multiHandLandmarks.length;
                // Map tension (closeness of fingers) to scale
                targetScale = THREE.MathUtils.mapLinear(avgTension, 0.1, 0.45, 0.4, 3.5);
            } else {
                targetScale = 1.0; // Return to normal if no hand
            }
        });

        const cameraInst = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraInst.start();

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Interpolate Scale (Tension)
            currentScale += (targetScale - currentScale) * 0.1;
            particles.scale.setScalar(currentScale);

            // Morph Position
            const positions = particles.geometry.attributes.position.array;
            for(let i=0; i<particleCount*3; i++) {
                positions[i] += (targetPositions[i] - positions[i]) * 0.08;
            }
            particles.geometry.attributes.position.needsUpdate = true;

            // Update Color
            particles.material.color.set(document.getElementById('colorPicker').value);

            particles.rotation.y += 0.003;
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
